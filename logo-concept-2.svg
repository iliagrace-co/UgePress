<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">

  <!-- Background -->
  <rect width="320" height="80" fill="#FAF8F5"/>

  <!-- Monogram U — custom geometric letterform with implied wave at base -->
  <!-- Two vertical strokes, slightly flared at base, connected by a curve with a subtle wave-crest notch -->
  <path
    d="
      M 24,18
      L 24,50
      C 24,62 48,66 48,54
      C 48,42 48,42 48,42
      C 48,56 72,62 72,50
      L 72,18
    "
    stroke="#1a1a1a"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Subtle wave notch at base of U curve — the hidden detail -->
  <path
    d="M 38,57 C 42,52 44,54 48,54 C 52,54 54,52 58,57"
    stroke="#C45D3E"
    stroke-width="1.2"
    stroke-linecap="round"
    fill="none"
    opacity="0.85"
  />

  <!-- Wordmark -->
  <text
    x="96"
    y="44"
    font-family="'Cormorant Garamond', 'Garamond', 'Georgia', serif"
    font-size="20"
    font-weight="400"
    letter-spacing="4"
    fill="#1a1a1a"
  >UGE PRESS</text>

  <!-- Thin rule beneath wordmark -->
  <line x1="96" y1="52" x2="256" y2="52" stroke="#e8e4df" stroke-width="0.75"/>

</svg>
